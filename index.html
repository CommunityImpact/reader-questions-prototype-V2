<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex,nofollow" />
<title>Community Impact — Reader Questions Portal</title>
<style>
  :root { --red: #bb2f2c; --red-dark: #9a2522; --ink: #1d2731; --border: #e3e3e3; --muted: #6b7280; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: linear-gradient(180deg, #f6f7f9 0%, #e9ecf0 100%);
    color: #1c1f24;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }
  .gate {
    background: #fff;
    border-radius: 8px;
    padding: 40px 36px 32px;
    max-width: 400px; width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.12);
    text-align: center;
  }
  .gate img { height: 56px; margin-bottom: 12px; }
  .gate h1 { font-size: 18px; margin: 8px 0 6px; font-weight: 700; }
  .gate p.sub { color: var(--muted); font-size: 13px; margin: 0 0 20px; }
  .gate label { display: block; text-align: left; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: #4b5563; }
  .gate input {
    width: 100%; padding: 11px 13px; border: 1px solid var(--border);
    border-radius: 3px; font-size: 14px; font-family: inherit;
  }
  .gate input:focus { outline: none; border-color: var(--red); box-shadow: 0 0 0 3px rgba(187,47,44,0.12); }
  .gate button {
    margin-top: 14px; width: 100%; padding: 12px; border: 0;
    background: var(--red); color: #fff; border-radius: 3px;
    font-size: 14px; font-weight: 700; letter-spacing: 0.3px;
    cursor: pointer;
  }
  .gate button:hover { background: var(--red-dark); }
  .gate button:disabled { background: #c1c1c1; cursor: not-allowed; }
  .err { color: var(--red); font-size: 13px; margin-top: 10px; min-height: 18px; }
  .footer-note { font-size: 11px; color: var(--muted); margin-top: 22px; }
</style>
</head>
<body>
<div class="gate" id="gate">
  <img src="ci-logo.png" alt="Community Impact" />
  <h1>Reader Questions Portal</h1>
  <p class="sub">This prototype is password-protected.</p>
  <form id="gateForm" autocomplete="off" onsubmit="return false;">
    <label for="pw">Password</label>
    <input type="password" id="pw" autofocus />
    <button id="unlock" type="submit">Unlock</button>
    <div class="err" id="err"></div>
  </form>
  <div class="footer-note">Internal prototype · Community Impact</div>
</div>

const ITERATIONS = 250000;

function b64ToBytes(b64) {
  const bin = atob(b64);
  const out = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
  return out;
}

async function decrypt(password) {
  const blob = b64ToBytes(BLOB_B64);
  const salt = blob.slice(0, 16);
  const iv = blob.slice(16, 28);
  const tag = blob.slice(28, 44);
  const ct = blob.slice(44);
  const ctWithTag = new Uint8Array(ct.length + tag.length);
  ctWithTag.set(ct);
  ctWithTag.set(tag, ct.length);
  const baseKey = await crypto.subtle.importKey(
    "raw", new TextEncoder().encode(password), "PBKDF2", false, ["deriveKey"]
  );
  const key = await crypto.subtle.deriveKey(
    { name: "PBKDF2", salt, iterations: ITERATIONS, hash: "SHA-256" },
    baseKey,
    { name: "AES-GCM", length: 256 },
    false, ["decrypt"]
  );
  const plain = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, ctWithTag);
  return new TextDecoder().decode(plain);
}

const form = document.getElementById("gateForm");
const pw = document.getElementById("pw");
const errEl = document.getElementById("err");
const btn = document.getElementById("unlock");

form.addEventListener("submit", async () => {
  errEl.textContent = "";
  btn.disabled = true; btn.textContent = "Unlocking...";
  try {
    const html = await decrypt(pw.value);
    sessionStorage.setItem("ci_proto_unlocked", "1");
    document.open();
    document.write(html);
    document.close();
  } catch (e) {
    errEl.textContent = "Incorrect password.";
    btn.disabled = false; btn.textContent = "Unlock";
    pw.select();
  }
});
</script>
